name: sfc-team
include:
   - compose.Infrastructure.yaml
x-build-args: &build_args
  args:
    BUILD_CONFIGURATION: Release
x-entrypoint-common-volume: &entrypoint_common_volume
  type: bind
  source: ${PWD}/entrypoint.Common.sh
  target: /app/entrypoint.Common.sh
x-entrypoint-volume: &entrypoint_volume
  type: bind
  source: ${PWD}/entrypoint.sh
  target: /app/entrypoint.sh
services:
  sfc-team:
    extends:
      file: compose.Common.yaml
      service: sfc-team  
    image: kryvorukandrii/sfc.team:latest
    build:
      dockerfile: src/API/SFC.Team.Api/Dockerfile
      <<: *build_args
    entrypoint: ["/bin/sh", "entrypoint.sh"]
    command: ["SFC.Team.Api"]
    env_file:
      - environments/api/api.Production.env
    volumes:
      - *entrypoint_common_volume
      - *entrypoint_volume
  sfc-data:
    extends:
      file: compose.Common.yaml
      service: sfc-data  
    image: kryvorukandrii/sfc.data:latest
    build:
      dockerfile: ../sfc-data-service/src/API/SFC.Data.Api/Dockerfile
      <<: *build_args
    entrypoint: ["/bin/sh", "entrypoint.sh"]
    command: ["SFC.Data.Api"]
    env_file:
      - ../sfc-data-service/environments/api/api.Production.env
    volumes:
      - *entrypoint_common_volume
      - *entrypoint_volume
  sfc-identity:
    extends:
      file: compose.Common.yaml
      service: sfc-identity  
    image: kryvorukandrii/sfc.identity:latest
    build:
      dockerfile: ../sfc-identity-service/src/API/SFC.Identity.Api/Dockerfile
      <<: *build_args
    entrypoint: ["/bin/sh", "entrypoint.sh"]
    command: ["SFC.Identity.Api"]
    env_file:
      - ../sfc-identity-service/environments/api/api.Production.env
    volumes:
      - *entrypoint_common_volume
      - *entrypoint_volume
  sfc-player:
    extends:
      file: compose.Common.yaml
      service: sfc-player  
    image: kryvorukandrii/sfc.player:latest
    build:
      dockerfile: ../sfc-player-service/src/API/SFC.Player.Api/Dockerfile
      <<: *build_args
    entrypoint: ["/bin/sh", "entrypoint.sh"]
    command: ["SFC.Player.Api"]
    env_file:
      - ../sfc-player-service/environments/api/api.Production.env
    volumes:
      - *entrypoint_common_volume
      - *entrypoint_volume