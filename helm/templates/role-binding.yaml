apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sfc-team-role-binding
  namespace: sfc
  labels:
    app.kubernetes.io/name: sfc-team
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: sfc
    app.kubernetes.io/instance: production
    app.kubernetes.io/managed-by: kubectl
  annotations:
    owner: "krivorukandrey@gmail.com"
    purpose: "Role binding for Team component in SFC application"
subjects:
  - kind: ServiceAccount
    name: sfc-team-service-account
    namespace: sfc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sfc-team-role