apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sfc-team-role
  namespace: sfc
  labels:
    app.kubernetes.io/name: sfc-team
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: sfc
    app.kubernetes.io/instance: production
    app.kubernetes.io/managed-by: kubectl
  annotations:
    owner: "krivorukandrey@gmail.com"
    purpose: "Role for Team component in SFC application"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]